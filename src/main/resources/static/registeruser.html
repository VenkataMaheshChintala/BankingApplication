<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>

        *{ 
            margin:0;
            padding:0; 
            box-sizing:border-box; 
            font-family:Arial, sans-serif; 
        } 
        
        body{ 
            min-height:100vh;
            display:flex;
            justify-content:center; 
            align-items:center; 
            background:#f4f7fa; 
        } 
        
        .container{ 
            width:400px; 
            background:white; 
            padding:30px; 
            border-radius:12px; 
            box-shadow:0 4px 15px rgba(0,0,0,0.1); 
        } 
        
        h2{ 
            text-align:center; 
            margin-bottom:25px; 
        }
        
        .form-group{
            margin-bottom:15px; 
        } 
        
        label{
            display:block;
            margin-bottom:6px; 
            font-size:14px; 
            font-weight:bold; 
        } 
        
        input{ 
            width:100%; 
            padding:10px; 
            border:1px 
            solid #ccc; 
            border-radius:6px; 
        }
        
        .submit-btn{ 
            width:100%;
            padding:12px;
            border:none; 
            border-radius:6px; 
            background:#2563eb; 
            color:white; 
            font-size:16px; 
            cursor:pointer; 
            margin-top:10px; 
        }
         
        .submit-btn:hover{ 
            background:#1d4ed8;
        } 
        
        .login-link{
            text-align:center; 
            margin-top:18px; 
            font-size:14px; 
        }
        
        .login-link a{ 
            color:#2563eb; 
            text-decoration:none; 
            font-weight:bold; 
        } 
        
        .login-link a:hover{ 
            text-decoration:underline; 
        }

    </style>
</head>
<body>

    <div class="container">

        <h2>Create Account</h2>

        <form>

            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter Username" id="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" id="password">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter Phone number" id="phno">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter email address" id="email" required>
            </div>

            <button type="button" class="submit-btn" onclick="register()"> Create Account </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </div>

    </div>

    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phno').value;
            const email = document.getElementById('email').value;

            console.log(phone);
            const response = await fetch('/userapi/register', {
                method: 'POST',
                headers: {
                    'Content-Type' : 'application/json'
                },
                body: JSON.stringify({ username, password, phone, email})
            });

            const data = await response.json();
            console.log(data);

            if(data.status) {
                alert('Registration Successful!');
                // window.location.href = '/dashboard';
            } else {
                alert('Registration failed : ' + data.message);
            }
        }
    </script>

</body>
</html>
