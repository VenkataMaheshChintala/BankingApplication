<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Banking Dashboard | Modern Bank</title>

        <script>
            // Authentication Check
            const token = localStorage.getItem('token')
            if (!token) {
                window.location.href = '/login.html'
            }
        </script>

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <style>
            :root {
                --primary: #2563eb;
                --primary-dark: #1d4ed8;
                --primary-light: rgba(37, 99, 235, 0.1);
                --bg-color: #f4f7fa;
                --surface: #ffffff;
                --text-main: #111827;
                --text-muted: #6b7280;
                --border: #e5e7eb;
                --success: #10b981;
                --sidebar-width: 280px;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Inter', sans-serif;
            }

            body {
                background-color: var(--bg-color);
                height: 100vh;
                display: flex;
                overflow: hidden;
                color: var(--text-main);
            }

            /* --- Sidebar Styling --- */
            .sidebar {
                width: var(--sidebar-width);
                background: var(--surface);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                padding: 24px 16px;
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 0 12px;
                margin-bottom: 40px;
            }

            .logo-box {
                width: 40px;
                height: 40px;
                background: var(--primary);
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
            }

            .brand h2 {
                font-size: 18px;
                font-weight: 700;
                color: var(--text-main);
            }

            .menu-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 16px;
                border-radius: 12px;
                color: var(--text-muted);
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
                margin-bottom: 8px;
            }

            .menu-item svg {
                width: 20px;
                height: 20px;
                color: inherit;
            }

            .menu-item:hover {
                background: #f9fafb;
                color: var(--text-main);
            }

            .menu-item.active {
                background: var(--primary-light);
                color: var(--primary);
                font-weight: 600;
            }

            /* --- Main Content Styling --- */
            .content {
                flex: 1;
                padding: 48px;
                overflow-y: auto;
            }

            .page {
                display: none;
                animation: fadeIn 0.3s ease;
            }

            .page.active-page {
                display: block;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .page-title {
                font-size: 28px;
                font-weight: 700;
                margin-bottom: 32px;
                color: var(--text-main);
            }

            .card {
                background: var(--surface);
                padding: 32px;
                border-radius: 20px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.5);
                margin-bottom: 24px;
            }

            .card h3 {
                font-size: 18px;
                font-weight: 600;
                margin-bottom: 24px;
                padding-bottom: 12px;
                border-bottom: 1px solid var(--border);
            }

            /* --- Forms & Inputs --- */
            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                display: block;
                margin-bottom: 8px;
                font-size: 14px;
                font-weight: 600;
                color: var(--text-main);
            }

            .form-group input,
            .form-group select {
                width: 100%;
                padding: 14px 16px;
                border: 1px solid var(--border);
                border-radius: 12px;
                font-size: 15px;
                color: var(--text-main);
                background: #f9fafb;
                transition: all 0.2s ease;
                outline: none;
                cursor: pointer;
            }

            .form-group input:focus,
            .form-group select:focus {
                background: var(--surface);
                border-color: var(--primary);
                box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            }

            /* --- Buttons --- */
            button.primary-btn {
                padding: 14px 24px;
                background: var(--primary);
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            }

            button.primary-btn:hover {
                background: var(--primary-dark);
                transform: translateY(-1px);
                box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
            }

            .action-buttons {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 16px;
            }

            .action-btn {
                padding: 16px;
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text-main);
                border-radius: 12px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 8px;
            }

            .action-btn:hover {
                border-color: var(--primary);
                color: var(--primary);
                background: var(--primary-light);
            }

            /* --- Tables --- */
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
            }

            table th {
                background: #f9fafb;
                color: var(--text-muted);
                font-size: 12px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                padding: 14px 16px;
                text-align: left;
                border-bottom: 1px solid var(--border);
                border-radius: 8px 8px 0 0;
            }

            table td {
                padding: 16px;
                border-bottom: 1px solid var(--border);
                color: var(--text-main);
                font-size: 14px;
            }

            table tr:last-child td {
                border-bottom: none;
            }

            /* --- Specific Elements --- */
            .balance-result {
                margin-top: 24px;
                font-size: 32px;
                font-weight: 700;
                color: var(--success);
                display: flex;
                align-items: center;
                gap: 12px;
            }
        </style>
    </head>
    <body>
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-box">
                    <svg
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="white"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <rect
                            x="3"
                            y="11"
                            width="18"
                            height="11"
                            rx="2"
                            ry="2"
                        ></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h2>Modern Bank</h2>
            </div>

            <div class="menu-item active" onclick="showpage('accounts', this)">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                Accounts
            </div>
            <div class="menu-item" onclick="showpage('balance', this)">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <line x1="12" y1="1" x2="12" y2="23"></line>
                    <path
                        d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"
                    ></path>
                </svg>
                Check Balance
            </div>
            <div class="menu-item" onclick="showpage('history', this)">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Transaction History
            </div>
        </aside>

        <main class="content">
            <div id="accounts" class="page active-page">
                <h1 class="page-title">Accounts Overview</h1>

                <div class="card">
                    <h3>Open New Account</h3>
                    <div class="form-group">
                        <label for="username">Account Holder Name</label>
                        <input
                            type="text"
                            id="username"
                            placeholder="Enter Username"
                        />
                    </div>
                    <div class="form-group">
                        <label for="accountType">Account Type</label>
                        <select id="accountType">
                            <option value="SAVINGS">Savings Account</option>
                            <option value="CURRENT">Current Account</option>
                        </select>
                    </div>
                    <button class="primary-btn" onclick="createAccount()">
                        Create Account
                    </button>
                </div>

                <div class="card">
                    <h3>Quick Actions</h3>
                    <div class="action-buttons">
                        <button class="action-btn">
                            <svg
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Deposit
                        </button>
                        <button class="action-btn">
                            <svg
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Withdraw
                        </button>
                        <button class="action-btn">
                            <svg
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <polyline points="17 1 21 5 17 9"></polyline>
                                <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                                <polyline points="7 23 3 19 7 15"></polyline>
                                <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                            </svg>
                            Transfer
                        </button>
                    </div>
                </div>
            </div>

            <div id="balance" class="page">
                <h1 class="page-title">Check Balance</h1>
                <div class="card">
                    <h3>Inquire Balance</h3>
                    <div class="form-group">
                        <label for="checkBalanceAccountNumber"
                            >Account Number</label
                        >
                        <input
                            type="text"
                            placeholder="Enter 10-digit Account Number"
                            id="checkBalanceAccountNumber"
                        />
                    </div>
                    <button class="primary-btn" onclick="checkBalance()">
                        Check Balance
                    </button>

                    <div class="balance-result">₹ 0.00</div>
                </div>
            </div>

            <div id="history" class="page">
                <h1 class="page-title">Transaction History</h1>
                <div class="card">
                    <h3>View Statement</h3>
                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="text" placeholder="Enter Account Number" />
                    </div>
                    <button class="primary-btn" style="margin-bottom: 24px">
                        Fetch Transactions
                    </button>

                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Transaction Type</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td
                                    colspan="3"
                                    style="
                                        text-align: center;
                                        color: var(--text-muted);
                                        padding: 32px;
                                    "
                                >
                                    No transactions to display
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <script>
            async function checkBalance() {
                var accno = document.getElementById(
                    'checkBalanceAccountNumber',
                ).value
                const token = localStorage.getItem('token')

                const response = await fetch('/accountapi/checkbalance', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: 'Bearer' + token,
                    },
                    body: JSON.stringify({
                        accountNumber: accno,
                    }),
                })

                const result = await response.json()

                if (result.status) {
                    alert('Balance Check fetch successful')
                    const checkBalanceResultDiv =
                        document.querySelector('.balance-result')
                    checkBalanceResultDiv.textContent = '₹' + result.balance
                } else {
                    alert('Balance Check fetch failed : ' + response.message)
                }
            }
            async function createAccount() {
                var username = document.getElementById('username').value
                var accountType = document.getElementById('accountType').value
                const token = localStorage.getItem('token')

                const response = await fetch('/accountapi/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: 'Bearer ' + token,
                    },
                    body: JSON.stringify({
                        username: username,
                        accountType: accountType,
                    }),
                })

                const result = await response.json()

                if (result.success) {
                    alert('Account creation successful!')
                    window.location.href = '/dashboard.html'
                } else {
                    alert('Account creation failed: ' + result.message)
                }
            }
            function showpage(pageId, element) {
                const pages = document.querySelectorAll('.page')
                pages.forEach((page) => {
                    page.classList.remove('active-page')
                })

                document.getElementById(pageId).classList.add('active-page')
                const menuItems = document.querySelectorAll('.menu-item')

                menuItems.forEach((item) => {
                    item.classList.remove('active')
                })

                element.classList.add('active')
            }
        </script>
    </body>
</html>
