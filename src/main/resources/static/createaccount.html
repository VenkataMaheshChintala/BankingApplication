<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Create Bank Account | Modern Bank</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <style>
            :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-color: #f4f7fa;
            --surface: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 50% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%);
            padding: 20px;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: var(--surface);
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
        }

        .header-text {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-text h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .header-text p {
            font-size: 15px;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            color: #9ca3af;
            pointer-events: none; /* Prevents icon from blocking clicks */
        }

        /* Applied to both input and select for consistency */
        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-main);
            background: #f9fafb;
            transition: all 0.2s ease;
            outline: none;
            cursor: pointer;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            background: var(--surface);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }
        </style>
    </head>

    <body>
        <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="logo-container">
                <div class="logo-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>

            <div class="header-text">
                <h2>Open Account</h2>
                <p>Select your preferred banking account</p>
            </div>

            <form onsubmit="event.preventDefault();">
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="username" placeholder="Enter Username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="accountType">Account Type</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        <select id="accountType" required>
                            <option value="" disabled selected hidden>Select Account Type</option>
                            <option value="SAVINGS">Savings Account</option>
                            <option value="CURRENT">Current Account</option>
                        </select>
                    </div>
                </div>

                <button type="button" class="submit-btn" onclick="createAccount()">Open Account</button>
            </form>

            <div class="message" id="message"></div>

        </div>
    </div>

        <script>
            async function createAccount() {
                var username = document.getElementById('username').value
                var accountType = document.getElementById('accountType').value

                const response = await fetch('/accountapi/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        accountType: accountType,
                    }),
                })

                const result = await response.json()

                if (result.success) {
                    alert('Account creation successful!')
                    window.location.href = '/dashboard.html'
                } else {
                    alert('Account creation failed: ' + result.message)
                }
            }
        </script>
    </body>
</html>
